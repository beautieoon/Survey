/* ── Gate / Password Screen ── */
#gate{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity .6s ease}
#gate.hide{opacity:0;pointer-events:none}
#gate canvas{position:absolute;inset:0;width:100%;height:100%}
#gate .g-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0}
#gate .g-lines{position:relative;width:36rem;height:9rem;pointer-events:none}
#gate .g-title{font-size:clamp(3rem,8vw,6rem);font-weight:800;color:#fff;letter-spacing:-.04em;line-height:1;text-align:center}
#gate .g-sub{font-size:.85rem;color:#71717a;margin-top:.75rem;letter-spacing:.06em;text-transform:uppercase}
#gate .g-form{margin-top:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.75rem}
#gate .g-input{width:14rem;padding:.65rem 1rem;border-radius:.75rem;border:1px solid #27272a;background:#0a0a0a;color:#fff;font-size:1.1rem;letter-spacing:.3em;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s}
#gate .g-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.25)}
#gate .g-input.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#gate .g-btn{padding:.6rem 2rem;border-radius:.75rem;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:.85rem;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .15s;letter-spacing:.03em}
#gate .g-btn:hover{opacity:.9;transform:translateY(-1px)}
#gate .g-err{font-size:.78rem;color:#f87171;height:1rem}
</style>
</head>

<!-- ══ PASSWORD GATE ══ -->
<div id="gate">

    <!-- decorative gradient lines (Aceternity-style) -->

      <div style="position:absolute;left:10%;right:10%;top:0;height:2px;background:linear-gradient(90deg,transparent,#6366f1,transparent);filter:blur(2px)"></div>
      <div style="position:absolute;left:10%;right:10%;top:0;height:1px;background:linear-gradient(90deg,transparent,#6366f1,transparent)"></div>
      <div style="position:absolute;left:30%;right:30%;top:0;height:5px;background:linear-gradient(90deg,transparent,#38bdf8,transparent);filter:blur(3px)"></div>
      <div style="position:absolute;left:30%;right:30%;top:0;height:1px;background:linear-gradient(90deg,transparent,#38bdf8,transparent)"></div>
      <!-- radial fade mask -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 22rem 8rem at top,transparent 20%,#000)"></div>

      <input id="gateInput" class="g-input" type="password" placeholder="· · ·" maxlength="10" autocomplete="off"/>
      <button class="g-btn" onclick="checkGate()">Enter</button>

</div>

/* ── shadcn/ui Primitives ── */
const cn=(...c)=>c.filter(Boolean).join(' ');
const getInitials=(name)=>name.split(' ').map(p=>p[0]).slice(0,2).join('');
const BV={

  link:'text-primary underline-offset-4 hover:underline',
};
const BS={default:'h-9 px-4 py-2',sm:'h-8 px-3 text-xs',lg:'h-10 px-8',icon:'h-9 w-9 p-0'};
const Btn=({variant='default',size='default',className='',children,...p})=>html`<button className=${cn('inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50',BV[variant],BS[size],className)} ...${p}>${children}</button>`;

const CardF=({className='',children})=>html`<div className=${cn('flex items-center px-6 py-4 border-t border-border',className)}>${children}</div>`;
const Bdg=({variant='default',className='',children})=>{
  const v={default:'bg-primary/10 text-primary',secondary:'bg-secondary text-secondary-foreground',destructive:'bg-destructive/10 text-destructive',outline:'border border-border text-foreground',success:'bg-emerald-500/10 text-emerald-700',warning:'bg-amber-500/10 text-amber-700',info:'bg-blue-500/10 text-blue-700'};

const Txta=({className='',onChange,...p})=>{
  const ref=useRef(null);
  const resize=()=>{const el=ref.current;if(!el)return;el.style.height='auto';el.style.height=Math.min(el.scrollHeight,320)+'px';};
  useEffect(()=>{resize();},[p.value,p.defaultValue]);
  return html`<textarea ref=${ref} rows="1"
    className=${cn('flex w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 overflow-y-auto resize-none',className)}

    onChange=${e=>{resize();onChange&&onChange(e);}}
    onInput=${resize}

/* ── Rich Text Editor ── */
const RichTextEditor=({placeholder='',onHtmlChange,onTextChange,className=''})=>{
  const edRef=useRef(null);
  const[empty,setEmpty]=useState(true);
  const[activeFormats,setActiveFormats]=useState({});
  const exec=(cmd,val=null)=>{document.execCommand(cmd,false,val);edRef.current?.focus();syncState();};
  const syncState=()=>{
    const el=edRef.current;if(!el)return;
    const txt=el.innerText.trim();
    setEmpty(!txt);
    onTextChange&&onTextChange(txt);
    onHtmlChange&&onHtmlChange(el.innerHTML);
    setActiveFormats({bold:document.queryCommandState('bold'),italic:document.queryCommandState('italic'),underline:document.queryCommandState('underline'),ul:document.queryCommandState('insertUnorderedList'),ol:document.queryCommandState('insertOrderedList')});
  };
  const tools=[
    {cmd:'bold',label:html`<strong style=${{fontFamily:'serif'}}>B</strong>`},
    {cmd:'italic',label:html`<em style=${{fontFamily:'serif',fontSize:'13px'}}>I</em>`},
    {cmd:'underline',label:html`<span style=${{textDecoration:'underline',fontSize:'12px'}}>U</span>`},
    {cmd:'sep1'},
    {cmd:'insertUnorderedList',cmd2:'ul',label:html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>`},
    {cmd:'insertOrderedList',cmd2:'ol',label:html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8.5" fontSize="7" fill="currentColor" stroke="none" fontWeight="bold">1</text><text x="1.5" y="14.5" fontSize="7" fill="currentColor" stroke="none" fontWeight="bold">2</text><text x="1.5" y="20.5" fontSize="7" fill="currentColor" stroke="none" fontWeight="bold">3</text></svg>`},
    {cmd:'sep2'},
    {cmd:'createLink',label:html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,action:()=>{const url=window.prompt('Link URL:','https://');if(url)exec('createLink',url);}},
  ];
  return html`<div className=${cn('rounded-lg border border-input overflow-hidden transition-all focus-within:ring-1 focus-within:ring-primary focus-within:border-primary',className)}>
    <div className="flex items-center gap-0.5 px-2 py-1.5 border-b border-input bg-muted/40">
      ${tools.map((t,i)=>t.cmd.startsWith('sep')
        ?html`<div key=${t.cmd} className="w-px h-4 bg-border/60 mx-0.5"/>`
        :html`<button key=${t.cmd} type="button"
            title=${t.cmd}
            onMouseDown=${e=>{e.preventDefault();t.action?t.action():exec(t.cmd);}}
            className=${cn('min-w-[28px] h-7 px-1.5 rounded flex items-center justify-center text-xs transition-colors select-none',
              (activeFormats[t.cmd]||activeFormats[t.cmd2])?'bg-foreground text-background':'text-muted-foreground hover:bg-accent hover:text-foreground')}>
            ${t.label}
          </button>`)}
    </div>
    <div className="relative">
      <div ref=${edRef} contentEditable="true"
        onInput=${syncState} onKeyUp=${syncState} onMouseUp=${syncState}
        className="min-h-[110px] max-h-64 overflow-y-auto px-3 py-2.5 text-sm outline-none leading-relaxed [&_ul]:list-disc [&_ul]:pl-5 [&_ol]:list-decimal [&_ol]:pl-5 [&_a]:text-primary [&_a]:underline"
        style=${{wordBreak:'break-word'}}/>
      ${empty?html`<p className="absolute top-2.5 left-3 right-3 text-sm text-muted-foreground/50 pointer-events-none select-none leading-relaxed">${placeholder}</p>`:null}
    </div>
  </div>`;
};
const Sep=({className=''})=>html`<div className=${cn('shrink-0 bg-border h-[1px] w-full',className)}/>`;

};

const FloatingToolbar=({page,onNav,onTakeSurvey})=>{
  const[pos,setPos]=useState({x:null,y:null});
  const[dragging,setDragging]=useState(false);
  const[collapsed,setCollapsed]=useState(false);
  const[moved,setMoved]=useState(false);
  const dragOffset=useRef({x:0,y:0});
  const barRef=useRef(null);
  const dragMoved=useRef(false);

  useEffect(()=>{
    if(pos.x===null&&barRef.current){
      const w=barRef.current.offsetWidth;
      setPos({x:Math.round((window.innerWidth-w)/2),y:window.innerHeight-56});
    }
  },[]);

  const startDrag=(e)=>{
    dragMoved.current=false;
    setDragging(true);
    const r=barRef.current.getBoundingClientRect();
    dragOffset.current={x:e.clientX-r.left,y:e.clientY-r.top};
    e.preventDefault();
  };

  useEffect(()=>{
    if(!dragging)return;
    const onMove=(e)=>{
      dragMoved.current=true;
      setMoved(true);
      let x=e.clientX-dragOffset.current.x;
      let y=e.clientY-dragOffset.current.y;
      x=Math.max(0,Math.min(window.innerWidth-(barRef.current?.offsetWidth||200),x));
      y=Math.max(0,Math.min(window.innerHeight-(barRef.current?.offsetHeight||40),y));
      setPos({x,y});
    };
    const onUp=()=>setDragging(false);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[dragging]);

  const teacherPages=[
    {id:'t-home',label:'Home'},
    {id:'t-create',label:'Create'},
    {id:'t-editor',label:'Editor'},
    {id:'t-assign',label:'Assignments'},
    {id:'t-results',label:'Results'},
  ];
  const studentPages=[
    {id:'s-home-v2',label:'Home'},
    {id:'s-survey',label:'Take Survey',action:()=>onTakeSurvey(STUDENT_SURVEYS[0])},
    {id:'s-results',label:'Results'},
  ];

  const isTeacher=page.startsWith('t-');
  const isStudent=page.startsWith('s-');
  const pages=isTeacher?teacherPages:studentPages;
  const switchTeacher=()=>{if(!isTeacher)onNav('t-home');};
  const switchStudent=()=>{if(!isStudent)onNav('s-home-v2');};

  const style={
    position:'fixed',zIndex:300,
    left:pos.x===null?'50%':pos.x+'px',
    bottom:pos.y===null?'20px':'auto',
    top:pos.y===null?'auto':pos.y+'px',
    transform:pos.x===null?'translateX(-50%)':'none',
    transition:dragging?'none':'all .2s ease',
    cursor:dragging?'grabbing':'default',
    userSelect:'none',
  };

  return html`<div ref=${barRef} style=${style}>
    <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-xl border border-gray-200 p-1.5 flex items-center gap-1">

      <!-- Collapsed icon (shown when collapsed) -->
      ${collapsed?html`<div onMouseDown=${startDrag}
        className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 cursor-grab active:cursor-grabbing"
        style=${{background:'linear-gradient(135deg,#7c3aed,#6d28d9)'}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
          <circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>
        </svg>
      </div>`:null}

      <!-- Collapse toggle -->
      <button onClick=${()=>setCollapsed(!collapsed)}
        className="w-6 h-7 rounded-lg flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 flex-shrink-0 transition-colors"
        title=${collapsed?'Expand toolbar':'Collapse toolbar'}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          ${collapsed?html`<polyline points="9 18 15 12 9 6"/>`:html`<polyline points="15 18 9 12 15 6"/>`}
        </svg>
      </button>

      <!-- Collapsible content -->
      <div className="flex items-center gap-1 overflow-hidden transition-all duration-200"
        style=${{maxWidth:collapsed?'0':'900px',opacity:collapsed?0:1,pointerEvents:collapsed?'none':'auto'}}>

        <!-- Drag handle -->
        <div onMouseDown=${startDrag}
          className="w-6 h-7 rounded-lg flex items-center justify-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 flex-shrink-0 transition-colors"
          title="Drag to move">
          <svg width="8" height="14" viewBox="0 0 8 14" fill="currentColor">
            <circle cx="2" cy="2" r="1.5"/><circle cx="6" cy="2" r="1.5"/>
            <circle cx="2" cy="7" r="1.5"/><circle cx="6" cy="7" r="1.5"/>
            <circle cx="2" cy="12" r="1.5"/><circle cx="6" cy="12" r="1.5"/>
          </svg>
        </div>

        <!-- Flows button -->
        <button onClick=${()=>onNav('t-flows')}
          className=${cn('flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all mr-1 flex-shrink-0',
            page==='t-flows'?'text-white shadow-sm':'text-white')}
          style=${{background: page==='t-flows'?'linear-gradient(135deg,#6d28d9,#5b21b6)':'linear-gradient(135deg,#7c3aed,#6d28d9)'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="8" y="14" width="8" height="7" rx="1"/>

        <!-- Separator -->

              isTeacher?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700')}>
            👩‍🏫 Teacher
          </button>
          <button onClick=${switchStudent}
            className=${cn('flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold transition-all',
              isStudent?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700')}>
            🎓 Student
          </button>
        </div>

        <div className="flex items-center gap-0.5">
          ${pages.map(p=>{
            const isActive=page===p.id||(p.id==='t-results'&&page==='t-results-id');
            return html`<button key=${p.id}
              onClick=${()=>p.action?p.action():onNav(p.id)}
              className=${cn('px-3 py-1.5 rounded-lg text-xs font-medium transition-all',
                isActive?'bg-primary text-white shadow-sm':'text-gray-500 hover:text-gray-800 hover:bg-gray-100')}>
              ${p.label}

          })}

      </div>

/* ── Likert Editor ── */
const LikertEditor=({question,onChange})=>{
const[preset,setPreset]=useState(question.preset||'agreement');
const[pts,setPts]=useState(question.points||5);
const[customLabels,setCustomLabels]=useState(null);
const[editingLabels,setEditingLabels]=useState(false);
const presetLabels=PRESETS[preset]['labels'+pts];
const labels=customLabels&&customLabels.length===pts?customLabels:presetLabels;
const applyPreset=(newPreset,newPts)=>{setCustomLabels(null);setPreset(newPreset);setPts(newPts);onChange({preset:newPreset,points:newPts,customLabels:null});};
const updateLabel=(i,val)=>{const nl=[...labels];nl[i]=val;setCustomLabels(nl);onChange({customLabels:nl});};
const resetToPreset=()=>{setCustomLabels(null);onChange({customLabels:null});};
const isCustomized=customLabels&&JSON.stringify(customLabels)!==JSON.stringify(presetLabels);
return html`<div>
  <label className="text-xs font-medium text-muted-foreground mb-2 block">STATEMENT</label>
  <${Txta} defaultValue=${question.text} placeholder="Enter a statement (e.g., 'The instructor explains concepts clearly.')" className="h-20 resize-none mb-4"/>
  <div className="flex flex-wrap items-end gap-4 mb-5">
    <div>
      <label className="text-xs font-medium text-muted-foreground mb-1.5 block">SCALE POINTS</label>
      <div className="flex bg-muted rounded-md p-0.5 gap-0.5">
        ${[2,3,4,5,6,7].map(p=>html`<button key=${p} onClick=${()=>{applyPreset(preset,p);}} className=${cn('w-8 py-1.5 rounded-sm text-xs font-semibold transition-colors',pts===p?'bg-background text-primary shadow-sm':'text-muted-foreground hover:text-foreground')}>${p}</button>`)}
      </div>
    </div>
    <div>
      <label className="text-xs font-medium text-muted-foreground mb-1.5 block">PRESET SCALE</label>
      <select value=${preset} onChange=${e=>applyPreset(e.target.value,pts)} className="h-9 px-3 py-1 border border-input rounded-md text-sm bg-background focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
        ${Object.entries(PRESETS).map(([k,v])=>html`<option key=${k} value=${k}>${v.label}</option>`)}
      </select>
    </div>
    <button onClick=${()=>setEditingLabels(!editingLabels)} className=${cn('h-9 px-3 rounded-md text-xs font-medium border transition-colors',editingLabels?'border-primary text-primary bg-primary/5':'border-input text-muted-foreground hover:text-foreground hover:border-foreground/30')}>
      ${editingLabels?'Done Editing':'Edit Labels'}
    </button>
    ${isCustomized?html`<button onClick=${resetToPreset} className="h-9 px-3 rounded-md text-xs text-muted-foreground hover:text-foreground border border-dashed border-border hover:border-foreground/30 transition-colors">Reset</button>`:null}
  </div>
  ${editingLabels?html`
    <div className="mb-5">
      <label className="text-xs font-medium text-muted-foreground mb-2 block">CUSTOMIZE LABELS</label>
      <div className="grid gap-1.5" style=${{gridTemplateColumns:`repeat(${Math.min(pts,4)},1fr)`}}>
        ${labels.map((l,i)=>html`<div key=${i} className="flex flex-col gap-1">
          <span className="text-[10px] text-muted-foreground text-center">${i+1}</span>
          <input type="text" value=${l} maxLength="30"
            onChange=${e=>updateLabel(i,e.target.value)}
            className="text-xs px-2 py-1.5 border border-input rounded-md bg-background focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring text-center"/>
        </div>`)}
      </div>
    </div>`:null}
  <label className="text-xs font-medium text-muted-foreground mb-3 block">PREVIEW</label>
  <${LikertTrack} labels=${labels} interactive=${false}/>
</div>`;
};

/* ── MC Editor ── */
const MCEditor=({question})=>html`<div>
  <div className="flex gap-2 mb-4">
    <${Btn} variant=${question.mode==='single'?'secondary':'ghost'} size="sm" className=${question.mode==='single'?'bg-primary/10 text-primary hover:bg-primary/15':''}>Single Answer</${Btn}>
    <${Btn} variant=${question.mode!=='single'?'secondary':'ghost'} size="sm" className=${question.mode!=='single'?'bg-primary/10 text-primary hover:bg-primary/15':''}>Multiple Answers</${Btn}>
  </div>
  <label className="text-xs font-medium text-muted-foreground mb-2 block">QUESTION</label>
  <${Txta} defaultValue=${question.text} placeholder="Enter your question..." className="h-20 resize-none mb-4"/>

const goNextQ=()=>{

const setTokenValues=(vals)=>setAllTokenValues(prev=>({...prev,[activeChip]:typeof vals==='function'?vals(prev[activeChip]||{}):vals}));
const[editingToken,setEditingToken]=useState(null);
const[multiOpen,setMultiOpen]=useState(false);
useEffect(()=>{
  if(!editingToken)return;
  const close=()=>{setEditingToken(null);setMultiOpen(false);};
  document.addEventListener('mousedown',close);
  return()=>document.removeEventListener('mousedown',close);
},[editingToken]);
const[generating,setGenerating]=useState(false);
const[freePrompt,setFreePrompt]=useState('');
const[promptSuffix,setPromptSuffix]=useState('');
const[optimizing,setOptimizing]=useState(false);
const PLACEHOLDER_EXAMPLES=[
  'e.g. Create a 5-question mid-semester check-in for ECON 101, anonymous, with Likert and open-ended questions.',
  'e.g. Weekly wellbeing pulse for my CS class — keep it under 3 minutes.',
  'e.g. End-of-semester review focusing on teaching quality and workload balance.',
  'e.g. TA evaluation survey, anonymous, covering communication and helpfulness.',
];
const[phIdx,setPhIdx]=useState(0);
useEffect(()=>{
  if(freePrompt)return;
  const t=setInterval(()=>setPhIdx(i=>(i+1)%PLACEHOLDER_EXAMPLES.length),3200);
  return()=>clearInterval(t);
},[freePrompt]);
const[uploadedFiles,setUploadedFiles]=useState([]);
const[showUploadMenu,setShowUploadMenu]=useState(false);
const uploadMenuRef=useRef(null);
useEffect(()=>{
  if(!showUploadMenu)return;

  document.addEventListener('mousedown',close);
  return()=>document.removeEventListener('mousedown',close);
},[showUploadMenu]);

  const files=Array.from(e.target.files||[]);

  setUploadedFiles(prev=>[...prev,...mapped]);
  e.target.value='';
};
const removeFile=id=>setUploadedFiles(prev=>prev.filter(f=>f.id!==id));
const fmtSize=b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const fileIcon=type=>type.includes('pdf')?'📄':type.includes('image')?'🖼️':type.includes('word')||type.includes('document')?'📝':'📎';

  if(optimizing)return;

        '. Include a mix of Likert scale and open-ended questions for richer insights.');

};

const tpl=activeChip?TOKEN_TEMPLATES[activeChip]:null;
const setToken=(key,val)=>setTokenValues({...tokenValues,[key]:val});
const toggleMulti=(key,opt)=>{const cur=tokenValues[key]||[];const next=cur.includes(opt)?cur.filter(o=>o!==opt):[...cur,opt];setToken(key,next);};

const buildPrompt=()=>{
  if(!tpl)return '';

    if(tpl.tokens[p]){

      return Array.isArray(v)?v.join(', '):v;
    }
    return p;
  }).join('');
};

        {id:'n4',x:190,y:358,w:180,h:52,t:'screen',  label:'Student Atlas',     sub:'Full learner profile',    c:'#059669',p:'t-student-atlas', ic:'grad'},
      ],
      edges:[
        {f:'n1',t:'n2',dir:'v'},
        {f:'n2',t:'na',dir:'h'},
        {f:'n2',t:'n3',dir:'v'},
        {f:'n3',t:'n4',dir:'v'},
      ],
    },
    {
      id:'student',label:'Student Journey',color:'#d97706',
      desc:'Student receives a survey, completes it, and views their results',
      w:560,h:540,
      nodes:[
        {id:'n1',x:190,y:20, w:180,h:52,t:'screen',   label:'Student Home',  sub:'Todo & completed',           c:'#d97706',p:'s-home-v2', ic:'home'},
        {id:'n2',x:190,y:128,w:180,h:52,t:'screen',   label:'Take Survey',   sub:'Answer all questions',       c:'#dc2626',p:'s-survey',  ic:'clip'},
        {id:'n3',x:190,y:240,w:180,h:52,t:'screen',   label:'Submit',        sub:'Confirm responses',          c:'#059669',p:'s-survey',  ic:'check'},
        {id:'d1',x:218,y:336,w:124,h:40,t:'decision', label:'Results visible?',                                c:'#b45309'},
        {id:'n4',x:50, y:428,w:178,h:52,t:'screen',   label:'Class Results', sub:'My answers + distribution',  c:'#059669',p:'s-results', ic:'bar'},
        {id:'n5',x:332,y:428,w:178,h:52,t:'screen',   label:'My Answers',    sub:'Results not shared yet',     c:'#94a3b8',p:'s-results', ic:'check'},
      ],
      edges:[
        {f:'n1',t:'n2',dir:'v'},
        {f:'n2',t:'n3',dir:'v'},
        {f:'n3',t:'d1',dir:'v'},
        {f:'d1',t:'n4',dir:'dl',label:'Yes  ≥5 responses'},
        {f:'d1',t:'n5',dir:'dr',label:'No'},
      ],
    },
    {
      id:'ai',label:'AI Generation',color:'#6d28d9',
      desc:'Generate a custom survey from a description using AI assistance',
      w:560,h:540,
      nodes:[
        {id:'n1',x:190,y:20, w:180,h:52,t:'screen',   label:'Create Page',    sub:'Open survey creator',       c:'#7c3aed',p:'t-create', ic:'plus'},
        {id:'n2',x:190,y:128,w:180,h:52,t:'screen',   label:'Describe Survey',sub:'Topic, audience, tone',     c:'#7c3aed',p:'t-create', ic:'edit'},
        {id:'n3',x:190,y:240,w:180,h:52,t:'screen',   label:'AI Generates',   sub:'Questions drafted instantly',c:'#6d28d9',p:'t-create', ic:'star'},
        {id:'d1',x:218,y:336,w:124,h:40,t:'decision', label:'Satisfied?',                                     c:'#b45309'},
        {id:'n4',x:50, y:428,w:178,h:52,t:'screen',   label:'Survey Editor',  sub:'Review & fine-tune',        c:'#059669',p:'t-editor', ic:'edit'},
        {id:'n5',x:332,y:428,w:178,h:52,t:'screen',   label:'Refine Prompt',  sub:'Adjust & regenerate',       c:'#d97706',p:'t-create', ic:'trend'},
      ],
      edges:[
        {f:'n1',t:'n2',dir:'v'},
        {f:'n2',t:'n3',dir:'v'},
        {f:'n3',t:'d1',dir:'v'},
        {f:'d1',t:'n4',dir:'dl',label:'Yes'},
        {f:'d1',t:'n5',dir:'dr',label:'No'},
      ],
    },
  ];

  const flow=FLOWS[tab];
  const nMap=Object.fromEntries(flow.nodes.map(n=>[n.id,n]));

  const epath=(e)=>{
    const s=nMap[e.f],t=nMap[e.t];
    if(!s||!t)return'';
    if(e.dir==='v'){
      const sx=s.x+s.w/2,sy=s.y+s.h;
      const tx=t.x+t.w/2,ty=t.y;
      if(Math.abs(sx-tx)<1)return`M${sx} ${sy}L${tx} ${ty}`;
      const my=(sy+ty)/2;
      return`M${sx} ${sy}C${sx} ${my} ${tx} ${my} ${tx} ${ty}`;
    }
    if(e.dir==='h'){
      const fy=e.fy??0.5;
      const sx=s.x+s.w,sy=s.y+s.h*fy;
      const tx=t.x,ty=t.y+t.h/2;
      const mx=(sx+tx)/2;
      return`M${sx} ${sy}C${mx} ${sy} ${mx} ${ty} ${tx} ${ty}`;
    }
    if(e.dir==='dl'){
      const sy=s.y+s.h/2;
      const tx=t.x+t.w/2;
      return`M${s.x} ${sy}L${tx} ${sy}L${tx} ${t.y}`;
    }
    if(e.dir==='dr'){
      const sy=s.y+s.h/2;
      const tx=t.x+t.w/2;
      return`M${s.x+s.w} ${sy}L${tx} ${sy}L${tx} ${t.y}`;
    }
    return'';
  };

  const elabelPos=(e)=>{
    if(!e.label)return null;
    const s=nMap[e.f],t=nMap[e.t];
    if(!s||!t)return null;
    const sy=s.y+s.h/2;
    if(e.dir==='dl') return{x:(s.x+(t.x+t.w/2))/2, y:sy-8};
    if(e.dir==='dr') return{x:(s.x+s.w+(t.x+t.w/2))/2, y:sy-8};
    return null;
  };

  const renderNode=(node)=>{
    const{id,x,y,w,h,t,label,sub,c,p,ic}=node;
    const click=p?()=>onNav(p):null;

    if(t==='decision'){
      const cx=x+w/2,cy=y+h/2;
      return html`<g key=${id}>
        <polygon points="${cx},${y} ${x+w},${cy} ${cx},${y+h} ${x},${cy}"
          fill="#fefce8" stroke="#fbbf24" strokeWidth="1.5"/>
        <text x=${cx} y=${cy+0.5} textAnchor="middle" dominantBaseline="middle"
          fontSize="10" fontWeight="600" fill="#92400e" style=${{userSelect:'none'}}>${label}</text>
      </g>`;
    }

    const isNote=t==='note', isEnd=t==='end';
    const icX=x+(isNote?10:13), icCY=y+h/2;
    const txX=x+(isNote?28:36), txY=sub&&!isNote?y+h/2-7:y+h/2;

    return html`<g key=${id} onClick=${click} style=${{cursor:click?'pointer':'default'}}>
      ${isNote?html`<rect x=${x} y=${y} width=${w} height=${h} rx="8"
        fill=${c+'12'} stroke=${c+'40'} strokeWidth="1" strokeDasharray="4,2.5"/>`:null}
      ${isEnd?html`<rect x=${x} y=${y} width=${w} height=${h} rx="22"
        fill=${c+'18'} stroke=${c+'60'} strokeWidth="1.5"/>`:null}
      ${!isNote&&!isEnd?html`
        <rect x=${x} y=${y} width=${w} height=${h} rx="10"
          fill="white" stroke="#e8edf3" strokeWidth="1.5"
          style=${{filter:'drop-shadow(0 1px 4px rgba(0,0,0,0.07))'}}/>
        <rect x=${x+2} y=${y+(h-34)/2} width="3" height="34" rx="1.5" fill=${c}/>
      `:null}
      ${ic?html`<${Ico} k=${ic} cx=${icX+(isNote?5:6)} cy=${icCY} s=${isNote?12:14} color=${c}/>`:null}
      <text x=${txX} y=${txY+(sub&&!isNote?0:1)} fontSize=${isNote?10:12} fontWeight=${isNote?'500':'600'}
        fill=${isNote?'#475569':'#1e293b'} dominantBaseline=${sub&&!isNote?'auto':'middle'}
        style=${{userSelect:'none'}}>${label}</text>
      ${sub&&!isNote?html`<text x=${txX} y=${txY+14} fontSize="10" fill="#94a3b8"
        style=${{userSelect:'none'}}>${sub}</text>`:null}
    </g>`;
  };

  return html`<div className="min-h-screen bg-slate-50/50 pb-28">
    <!-- Header -->
    <div className="bg-white border-b border-gray-100 px-8 py-5">
      <div className="max-w-2xl mx-auto flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl flex items-center justify-center"
            style=${{background:'linear-gradient(135deg,#7c3aed,#5b21b6)'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="8" y="14" width="8" height="7" rx="1"/>
              <line x1="6.5" y1="10" x2="6.5" y2="14"/><line x1="17.5" y1="10" x2="17.5" y2="14"/>
              <line x1="6.5" y1="14" x2="12" y2="14"/><line x1="17.5" y1="14" x2="12" y2="14"/>
            </svg>
          </div>
          <div>
            <h1 className="text-lg font-bold text-gray-900">Product Flows</h1>
            <p className="text-xs text-gray-400">${FLOWS.length} flows · click any node to navigate</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div className="bg-white border-b border-gray-100">
      <div className="max-w-2xl mx-auto px-8 flex">
        ${FLOWS.map((f,i)=>html`<button key=${f.id}
          onClick=${()=>setTab(i)}
          className="px-5 py-3.5 text-sm font-medium border-b-2 transition-all whitespace-nowrap"
          style=${{borderBottomColor:tab===i?f.color:'transparent',color:tab===i?f.color:'#94a3b8'}}>
          ${f.label}
        </button>`)}
      </div>
    </div>

    <!-- Description -->
    <div className="max-w-2xl mx-auto px-8 pt-5 pb-3">
      <p className="text-sm text-gray-500">${flow.desc}</p>
    </div>

    <!-- SVG Flowchart -->
    <div className="max-w-2xl mx-auto px-8">
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 overflow-auto">
        <svg width=${flow.w} height=${flow.h} viewBox="0 0 ${flow.w} ${flow.h}"
          style=${{display:'block',maxWidth:'100%'}}>
          <defs>
            <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M0,1 L0,9 L10,5 Z" fill="#cbd5e1"/>
            </marker>
            <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
              <circle cx="0.8" cy="0.8" r="0.8" fill="#eff2f7"/>
            </pattern>
          </defs>

          <!-- dot grid bg -->
          <rect width=${flow.w} height=${flow.h} fill="url(#dotgrid)"/>

          <!-- edges -->
          ${flow.edges.map((e,i)=>{
            const d=epath(e);
            if(!d)return null;
            return html`<path key=${'e'+i} d=${d} fill="none" stroke="#dde3ec" strokeWidth="1.5" markerEnd="url(#ah)"/>`;
          })}

          <!-- edge labels -->
          ${flow.edges.map((e,i)=>{
            const pos=elabelPos(e);
            if(!pos)return null;
            return html`<text key=${'l'+i} x=${pos.x} y=${pos.y} textAnchor="middle"
              fontSize="10" fill="#94a3b8" fontWeight="500" style=${{userSelect:'none'}}>${e.label}</text>`;
          })}

          <!-- nodes -->
          ${flow.nodes.map(n=>renderNode(n))}
        </svg>
      </div>

      <!-- Legend -->
      <div className="flex items-center gap-5 mt-4 px-1">
        <div className="flex items-center gap-1.5 text-xs text-gray-400">
          <div className="w-10 h-5 rounded-md bg-white border border-gray-200 shadow-sm flex items-center pl-1">
            <div className="w-1 h-3 rounded-sm" style=${{background:flow.color}}/>
          </div>
          Screen / Page
        </div>
        <div className="flex items-center gap-1.5 text-xs text-gray-400">
          <div className="w-10 h-5 rounded-md border border-dashed" style=${{borderColor:flow.color+'60',background:flow.color+'10'}}/>
          Option / Branch
        </div>
        <div className="flex items-center gap-1.5 text-xs text-gray-400">
          <div className="w-5 h-5" style=${{background:'#fefce8',border:'1px solid #fbbf24',transform:'rotate(45deg)',borderRadius:'2px'}}/>
          Decision
        </div>
        <div className="text-xs text-gray-400 ml-auto">Click any node to navigate →</div>
      </div>
    </div>

  </div>`;
};

/* ══════════════════════════════════
   APP
   ══════════════════════════════════ */
const App=()=>{

  const sv=SURVEYS_LIST.find(s=>s.id===surveyId);

  ${page==='t-create'?html`<${TCreate} onNav=${onNav} onOpenSurvey=${onOpenSurvey} onPreviewTemplate=${onPreviewTemplate}/>`:null}

  ${page==='s-survey'?html`<${SSurvey} onNav=${onNav} surveyCtx=${surveyCtx}/>`:null}

};
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<!-- ══ GATE: Sparkles + Password Logic ══ -->
<script>
(function(){
  /* ── Sparkles canvas ── */
  const canvas=document.getElementById('sparkleCanvas');
  const ctx=canvas.getContext('2d');
  const DENSITY=1200; // particles per million px² (matches Aceternity default)
  let particles=[];
  let raf;

  function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    spawnParticles();
  }

  function rand(min,max){return Math.random()*(max-min)+min;}

  function spawnParticles(){
    const area=canvas.width*canvas.height;
    const count=Math.floor(area/1e6*DENSITY);
    particles=Array.from({length:count},()=>mkParticle());
  }

  function mkParticle(){
    return{
      x:rand(0,canvas.width),
      y:rand(0,canvas.height),
      size:rand(0.4,1.2),
      opacity:rand(0,1),
      delta:rand(0.003,0.012)*(Math.random()<.5?1:-1),
      speed:{x:rand(-.08,.08),y:rand(-.08,.08)},
    };
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const p of particles){
      p.opacity+=p.delta;
      if(p.opacity<=0||p.opacity>=1){p.delta*=-1;p.opacity=Math.max(0,Math.min(1,p.opacity));}
      p.x+=p.speed.x; p.y+=p.speed.y;
      if(p.x<-2)p.x=canvas.width+2;
      if(p.x>canvas.width+2)p.x=-2;
      if(p.y<-2)p.y=canvas.height+2;
      if(p.y>canvas.height+2)p.y=-2;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;
      ctx.fill();
    }
    raf=requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize();
  draw();

  /* ── Password logic ── */
  const PASS='007';
  const gate=document.getElementById('gate');
  const input=document.getElementById('gateInput');
  const err=document.getElementById('gateErr');

  // Check if already unlocked this session
  if(sessionStorage.getItem('kira_unlocked')==='1'){
    gate.style.display='none';
    cancelAnimationFrame(raf);
  }

  input.addEventListener('keydown',e=>{if(e.key==='Enter')checkGate();});

  window.checkGate=function(){
    if(input.value===PASS){
      sessionStorage.setItem('kira_unlocked','1');
      gate.classList.add('hide');
      setTimeout(()=>{gate.style.display='none';cancelAnimationFrame(raf);},650);
    } else {
      err.textContent='Incorrect password';
      input.classList.add('error');
      input.value='';
      setTimeout(()=>{input.classList.remove('error');err.textContent='';},1500);
    }
  };
})();
</script>
